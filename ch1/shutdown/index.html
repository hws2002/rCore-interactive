<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>rCore ch1 — 종료 과정</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Consolas,'Courier New',monospace;background:#0c1220;color:#e6edf3;height:100vh;display:flex;flex-direction:column;overflow:hidden}
h1{font-size:13px;color:#9fc3ff;background:#151c2f;border-bottom:1px solid #2a3552;padding:7px 12px;flex-shrink:0}
#main{flex:1;display:grid;grid-template-columns:38% 62%;min-height:0;overflow:hidden}
/* ─── LEFT ─── */
#left{background:#0b1020;border-right:1px solid #2a3552;display:flex;flex-direction:column;padding:8px;gap:7px;overflow:hidden}
#left h2{font-size:10px;color:#7fb1ff;margin-bottom:4px;letter-spacing:.5px}
#chain-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
#chain-svg-wrap{flex:1;overflow:hidden}
#chain-svg-wrap svg{display:block;width:100%;height:100%}
#reg-wrap{flex:0 0 auto}
#reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.rv{display:flex;justify-content:space-between;align-items:center;border:1px solid #1f2d44;border-radius:3px;padding:5px 8px;background:#0f182b;font-size:11px}
.rk{color:#7fa8d5}.rvv{color:#e8f0ff}
/* ─── RIGHT ─── */
#right{display:flex;flex-direction:column;padding:8px;gap:7px;overflow:hidden;background:#0e1528}
#step-bar{background:#121a2d;border:1px solid #2a3552;border-radius:5px;padding:7px 10px;flex-shrink:0}
#step-row{display:flex;align-items:baseline;gap:8px}
#step-num{font-size:11px;color:#7fb1ff;font-weight:bold;min-width:70px}
#step-title{font-size:13px;font-weight:bold;color:#f0f6fc}
#step-file{font-size:10px;color:#7a90b5;margin-top:2px}
#nav{display:flex;gap:8px;align-items:center;margin-top:6px}
button{background:#1b2740;border:1px solid #2a3552;color:#d8e6ff;padding:4px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit}
button:hover:not(:disabled){border-color:#58a6ff;color:#9fc3ff}
button:disabled{opacity:.35;cursor:not-allowed}
#prog-bar{flex:1;height:5px;background:#1c2842;border-radius:3px;overflow:hidden}
#prog-fill{height:100%;width:0;background:linear-gradient(90deg,#3f7dff,#7fb1ff);transition:width .2s}
#code-wrap{background:#121a2d;border:1px solid #2a3552;border-radius:5px;padding:7px;flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}
#code-label{font-size:10px;color:#7fb1ff;margin-bottom:4px;flex-shrink:0}
#code-lines{font-size:11.5px;line-height:1.5;white-space:pre;overflow-y:auto;flex:1;min-height:0}
.cl{display:block;padding:0 2px;color:#4a6a90}
.cl.hl{background:#352c0a;color:#ffd166;border-radius:2px}
.cl.done{color:#2e3e56}
#desc-wrap{background:#121a2d;border:1px solid #2a3552;border-radius:5px;padding:8px 10px;flex:0 0 auto;max-height:165px;overflow-y:auto}
#desc-title{font-size:11px;color:#ffd166;margin-bottom:5px}
#desc-text{font-size:12px;color:#c8d8f0;line-height:1.6;white-space:pre-wrap}
#desc-detail{font-size:10.5px;color:#5a7aaa;margin-top:6px;padding-top:6px;border-top:1px solid #1f2d44;white-space:pre-wrap}
</style>
</head>
<body>
<h1>rCore ch1 — 종료 과정: rust_main → exit_success() → sw 0x5555, 0(0x100000) → QEMU exit</h1>
<div id="main">

<!-- LEFT: 콜 체인 + 레지스터 -->
<div id="left">
  <div id="chain-wrap">
    <h2>CALL CHAIN (S-mode)</h2>
    <div id="chain-svg-wrap">
      <svg id="chain-svg" viewBox="0 0 200 280" preserveAspectRatio="xMidYMid meet" style="display:block;width:100%;height:100%"></svg>
    </div>
  </div>
  <div id="reg-wrap">
    <h2>STATE</h2>
    <div id="reg-grid"></div>
  </div>
</div>

<!-- RIGHT: 스텝 정보 + 코드 + 설명 -->
<div id="right">
  <div id="step-bar">
    <div id="step-row">
      <span id="step-num">Step 1 / 5</span>
      <span id="step-title">—</span>
    </div>
    <div id="step-file">—</div>
    <div id="nav">
      <button id="btn-prev-page" style="display:none;background:#1f2a50;border-color:#5888ff;color:#80b0ff;font-weight:bold">← boot</button>
      <button id="btn-prev" onclick="go(-1)">◄ Prev</button>
      <div id="prog-bar"><div id="prog-fill"></div></div>
      <button id="btn-next" onclick="go(1)">Next ►</button>
    </div>
  </div>

  <div id="code-wrap">
    <div id="code-label">소스 코드</div>
    <div id="code-lines"></div>
  </div>

  <div id="desc-wrap">
    <div id="desc-title">💡 설명</div>
    <div id="desc-text"></div>
    <div id="desc-detail"></div>
  </div>
</div>

</div>

<script src="data.js"></script>
<script>
let step = 0;

// ── 콜 체인 SVG ──
const BOX_X = 8, BOX_W = 184, BOX_H = 38, BOX_GAP = 14;
const ARROW_H = BOX_GAP;

function renderChainSVG(activeStep) {
  const svg = document.getElementById('chain-svg');
  let html = '';

  // 화살표 마커
  html += `<defs>
    <marker id="arr-dn" markerWidth="6" markerHeight="6" refX="3" refY="5" orient="auto">
      <path d="M0,0 L6,0 L3,6 Z" fill="#5a7aaa"/>
    </marker>
    <marker id="arr-dn-act" markerWidth="6" markerHeight="6" refX="3" refY="5" orient="auto">
      <path d="M0,0 L6,0 L3,6 Z" fill="#ffd166"/>
    </marker>
  </defs>`;

  CALL_CHAIN.forEach((box, i) => {
    const y = i * (BOX_H + BOX_GAP);
    const isActive = i === activeStep;
    const isPast   = i < activeStep;
    const opacity  = isPast ? 0.45 : isActive ? 1 : 0.2;
    const sw       = isActive ? 2 : 0.8;

    // 박스
    html += `<rect x="${BOX_X}" y="${y}" width="${BOX_W}" height="${BOX_H}"
      fill="${box.color}" fill-opacity="${opacity}"
      stroke="${box.border}" stroke-opacity="${isActive ? 1 : opacity}" stroke-width="${sw}" rx="4"/>`;

    // 레이블
    html += `<text x="${BOX_X + BOX_W/2}" y="${y + 14}" fill="${box.text}" fill-opacity="${opacity}"
      font-size="11" font-weight="${isActive ? 'bold' : 'normal'}" text-anchor="middle" font-family="Consolas,monospace">${box.label}</text>`;
    html += `<text x="${BOX_X + BOX_W/2}" y="${y + 28}" fill="${box.text}" fill-opacity="${opacity * 0.7}"
      font-size="8.5" text-anchor="middle" font-family="Consolas,monospace">${box.sub}</text>`;

    // 아래로 화살표 (마지막 박스 제외)
    if (i < CALL_CHAIN.length - 1) {
      const ay1 = y + BOX_H + 1;
      const ay2 = y + BOX_H + ARROW_H - 2;
      const isActiveArrow = i === activeStep || i < activeStep;
      const arrowColor = isPast ? '#5a7aaa' : isActive ? '#ffd166' : '#2a3552';
      const markerId = (isPast || isActive) ? 'arr-dn-act' : 'arr-dn';
      html += `<line x1="${BOX_X + BOX_W/2}" y1="${ay1}" x2="${BOX_X + BOX_W/2}" y2="${ay2}"
        stroke="${arrowColor}" stroke-width="1.5" marker-end="url(#${markerId})"/>`;
    }
  });

  svg.innerHTML = html;
}

// ── 레지스터 렌더링 ──
const REG_KEYS = [['Mode', 'mode'], ['PC', 'PC'], ['addr', 'addr'], ['val', 'val']];

function renderRegs(regs) {
  const el = document.getElementById('reg-grid');
  let html = '';
  REG_KEYS.forEach(([label, key]) => {
    const val = regs[key] !== undefined ? regs[key] : '─';
    html += `<div class="rv"><span class="rk">${label}</span><span class="rvv">${val}</span></div>`;
  });
  el.innerHTML = html;
}

// ── 코드 렌더링 ──
function renderCode(code, lineFrom, lineTo) {
  const to = (lineTo !== undefined) ? lineTo : lineFrom;
  const el = document.getElementById('code-lines');
  let html = '';
  code.forEach((t, i) => {
    let cls = 'cl';
    if (i < lineFrom)  cls += ' done';
    else if (i <= to)  cls += ' hl';
    html += `<span class="${cls}">${String(i+1).padStart(2,' ')}  ${t}</span>\n`;
  });
  el.innerHTML = html;
  const lines = el.querySelectorAll('.cl');
  if (lines[lineFrom]) lines[lineFrom].scrollIntoView({block:'nearest'});
}

// ── 전체 렌더 ──
function render() {
  const st = STEPS[step];
  document.getElementById('step-num').textContent = `Step ${step + 1} / ${STEPS.length}`;
  document.getElementById('step-title').textContent = st.title;
  document.getElementById('step-file').textContent = st.file;
  document.getElementById('prog-fill').style.width = `${(step / (STEPS.length - 1)) * 100}%`;
  document.getElementById('btn-prev').disabled = step === 0;
  document.getElementById('btn-next').disabled = step === STEPS.length - 1;

  // prevPage 버튼
  const prevPageBtn = document.getElementById('btn-prev-page');
  if (prevPageBtn) {
    if (step === 0 && st.prevPage) {
      prevPageBtn.style.display = 'inline-block';
      prevPageBtn.onclick = () => location.href = st.prevPage;
    } else {
      prevPageBtn.style.display = 'none';
    }
  }

  renderCode(st.code, st.lineFrom, st.lineTo);
  renderChainSVG(st.callStep);
  renderRegs(st.regs);

  document.getElementById('desc-text').textContent = st.desc;
  document.getElementById('desc-detail').textContent = st.detail || '';
}

function go(d) {
  step = Math.max(0, Math.min(STEPS.length - 1, step + d));
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
});

render();
</script>
</body>
</html>
