<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>rCore ch1 — 裸机启动过程</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Consolas,'Courier New',monospace;background:#0c1220;color:#e6edf3;height:100vh;display:flex;flex-direction:column;overflow:hidden}
h1{font-size:13px;color:#9fc3ff;background:#151c2f;border-bottom:1px solid #2a3552;padding:7px 12px;flex-shrink:0}
#main{flex:1;display:grid;grid-template-columns:50% 50%;min-height:0;overflow:hidden}
/* ─── LEFT ─── */
#left{background:#0b1020;border-right:1px solid #2a3552;display:flex;flex-direction:column;overflow:hidden}
#mem-wrap{flex:0 0 auto;padding:8px 8px 4px}
#mem-wrap h2{font-size:10px;color:#7fb1ff;margin-bottom:4px;letter-spacing:.5px}
#mem-svg-wrap{width:100%;overflow:visible}
#regs-wrap{flex:1;padding:6px 8px 8px;overflow-y:auto}
#regs-wrap h2{font-size:10px;color:#7fb1ff;margin-bottom:6px;letter-spacing:.5px}
#reg-table{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.rv{display:flex;justify-content:space-between;align-items:center;border:1px solid #1f2d44;border-radius:4px;padding:6px 10px;background:#0f182b;font-size:12px}
.rv.hi{border-color:#ffd166;background:#251f0a}
.rk{color:#7fa8d5}
.rvv{color:#e8f0ff}
/* ─── RIGHT ─── */
#right{display:flex;flex-direction:column;padding:8px;gap:7px;overflow:hidden;background:#0e1528}
#step-bar{background:#121a2d;border:1px solid #2a3552;border-radius:5px;padding:7px 10px;flex-shrink:0}
#step-row{display:flex;align-items:baseline;gap:8px}
#step-num{font-size:11px;color:#7fb1ff;font-weight:bold;min-width:70px}
#step-title{font-size:13px;font-weight:bold;color:#f0f6fc}
#step-file{font-size:10px;color:#7a90b5;margin-top:2px}
#nav{display:flex;gap:8px;align-items:center;margin-top:6px}
button{background:#1b2740;border:1px solid #2a3552;color:#d8e6ff;padding:4px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit}
button:hover:not(:disabled){border-color:#58a6ff;color:#9fc3ff}
button:disabled{opacity:.35;cursor:not-allowed}
#prog-bar{flex:1;height:5px;background:#1c2842;border-radius:3px;overflow:hidden}
#prog-fill{height:100%;width:0;background:linear-gradient(90deg,#3f7dff,#7fb1ff);transition:width .2s}
#code-wrap{background:#121a2d;border:1px solid #2a3552;border-radius:5px;padding:7px;flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}
#code-label{font-size:10px;color:#7fb1ff;margin-bottom:4px;flex-shrink:0}
#code-lines{font-size:11.5px;line-height:1.5;white-space:pre;overflow-y:auto;flex:1;min-height:0}
.cl{display:block;padding:0 2px;color:#4a6a90}
.cl.hl{background:#352c0a;color:#ffd166;border-radius:2px}
.cl.done{color:#2e3e56}
.cl.active{color:#c8daf0}
#desc-wrap{background:#121a2d;border:1px solid #2a3552;border-radius:5px;padding:8px 10px;flex:0 0 auto;max-height:165px;overflow-y:auto}
#desc-title{font-size:11px;color:#ffd166;margin-bottom:5px}
#desc-text{font-size:12px;color:#c8d8f0;line-height:1.6;white-space:pre-wrap}
#desc-detail{font-size:10.5px;color:#5a7aaa;margin-top:6px;padding-top:6px;border-top:1px solid #1f2d44;white-space:pre-wrap}
</style>
</head>
<body>
<h1>rCore ch1 — 裸机启动过程: QEMU → 0x1000 Firmware → 0x80000000 RustSBI → 0x80200000 Kernel</h1>
<div id="main">

<!-- LEFT: 주소 공간 SVG + 레지스터 -->
<div id="left">
  <div id="mem-wrap">
    <h2>ADDRESS SPACE</h2>
    <div id="mem-svg-wrap">
      <svg id="mem-svg" width="100%" viewBox="0 0 340 240" style="display:block"></svg>
    </div>
  </div>
  <div id="regs-wrap">
    <h2>CPU STATE</h2>
    <div id="reg-table"></div>
  </div>
</div>

<!-- RIGHT: 스텝 정보 + 코드 + 설명 -->
<div id="right">
  <div id="step-bar">
    <div id="step-row">
      <span id="step-num">Step 1 / 10</span>
      <span id="step-title">—</span>
    </div>
    <div id="step-file">—</div>
    <div id="nav">
      <button id="btn-prev-page" style="display:none;background:#1f2a50;border-color:#5888ff;color:#80b0ff;font-weight:bold">← build</button>
      <button id="btn-prev" onclick="go(-1)">◄ Prev</button>
      <div id="prog-bar"><div id="prog-fill"></div></div>
      <button id="btn-next" onclick="go(1)">Next ►</button>
      <button id="btn-next-page" style="display:none;background:#1f2a50;border-color:#5888ff;color:#80b0ff;font-weight:bold">shutdown →</button>
    </div>
  </div>

  <div id="code-wrap">
    <div id="code-label">소스 코드</div>
    <div id="code-lines"></div>
  </div>

  <div id="desc-wrap">
    <div id="desc-title">💡 설명</div>
    <div id="desc-text"></div>
    <div id="desc-detail"></div>
  </div>
</div>

</div><!-- #main -->

<script src="data.js"></script>
<script>
// ── SVG 상수 ──
const BAR_X = 120;   // 세그먼트 왼쪽 X (왼쪽에 PC화살표+라벨 공간 확보)
const BAR_W = 110;   // 세그먼트 폭
const LBL_X = BAR_X + BAR_W + 6; // 오른쪽 주소 레이블 X
const ZIGZAG_Y1 = 145, ZIGZAG_Y2 = 168; // 지그재그 간격 Y 범위

// ── 전역 상태 ──
let step = 0;

// ── SVG 렌더링 ──
function renderSVG(active, pcStr, showSp) {
  const svg = document.getElementById('mem-svg');
  const pcY = pcToY(pcStr);

  let html = '';

  // 마커 정의
  html += `<defs>
    <marker id="arr-pc" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arr-sp" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4ade80"/>
    </marker>
  </defs>`;

  // 지그재그 갭 (주소 불연속 표시) — 두 개의 평행 물결선
  const amp = 5;
  html += `<polyline points="
    ${BAR_X},${ZIGZAG_Y1}
    ${BAR_X+BAR_W*0.25},${ZIGZAG_Y1 - amp}
    ${BAR_X+BAR_W*0.5},${ZIGZAG_Y1 + amp}
    ${BAR_X+BAR_W*0.75},${ZIGZAG_Y1 - amp}
    ${BAR_X+BAR_W},${ZIGZAG_Y1}
  " fill="none" stroke="#3a4a60" stroke-width="1" stroke-dasharray="3,2"/>
  <polyline points="
    ${BAR_X},${ZIGZAG_Y2}
    ${BAR_X+BAR_W*0.25},${ZIGZAG_Y2 - amp}
    ${BAR_X+BAR_W*0.5},${ZIGZAG_Y2 + amp}
    ${BAR_X+BAR_W*0.75},${ZIGZAG_Y2 - amp}
    ${BAR_X+BAR_W},${ZIGZAG_Y2}
  " fill="none" stroke="#3a4a60" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="${BAR_X}" y="${ZIGZAG_Y1}" width="${BAR_W}" height="${ZIGZAG_Y2-ZIGZAG_Y1}" fill="#0c1220"/>
  <text x="${BAR_X+BAR_W/2}" y="${(ZIGZAG_Y1+ZIGZAG_Y2)/2+4}"
    fill="#2a3552" font-size="8.5" text-anchor="middle" font-family="Consolas,monospace">⋯ 주소 불연속 ⋯</text>`;

  // 세그먼트 그리기
  // 주소 라벨 규칙: 중복 방지
  //  - k(최상단): addrTop(상단) + addrBot(하단)
  //  - sbi: addrBot만 (addrTop = k.addrBot과 동일값)
  //  - fw: addrTop(지그재그 이후 상단) + addrBot(하단)
  SEGMENTS.forEach((seg, idx) => {
    const lay = SEG_LAYOUT[seg.id];
    const isActive = active.includes(seg.id);
    const opacity = isActive ? 1 : 0.35;
    const stroke = isActive ? seg.textColor : '#2a3552';
    const sw = isActive ? 1.5 : 0.5;

    html += `<rect x="${BAR_X}" y="${lay.y}" width="${BAR_W}" height="${lay.h}"
      fill="${seg.color}" fill-opacity="${opacity}"
      stroke="${stroke}" stroke-width="${sw}" rx="2"/>`;

    // 세그먼트 라벨 (내부)
    const cy = lay.y + lay.h / 2;
    html += `<text x="${BAR_X + BAR_W/2}" y="${cy - 3}"
      fill="${seg.textColor}" fill-opacity="${opacity}"
      font-size="9.5" text-anchor="middle" font-family="Consolas,monospace" font-weight="bold">${seg.label}</text>`;
    html += `<text x="${BAR_X + BAR_W/2}" y="${cy + 9}"
      fill="${seg.textColor}" fill-opacity="${opacity * 0.7}"
      font-size="7.5" text-anchor="middle" font-family="Consolas,monospace">${
        seg.id==='k' ? 'S-mode' : seg.id==='sbi' ? 'M-mode' : 'M-mode ROM'}</text>`;

    // 주소 라벨: 각 세그먼트의 최상단(addrTop)은 세그먼트 위쪽에만 표시
    // k.addrTop: k 위에, addrBot(=sbi.addrTop): k와 sbi 경계에 한 번만
    // fw.addrTop: zigzag 이후 fw 위에 표시
    if (seg.id === 'k') {
      // 최상단 경계선 + addrTop label (세그먼트 바깥 위쪽)
      html += `<line x1="${BAR_X}" y1="${lay.y}" x2="${BAR_X+BAR_W}" y2="${lay.y}" stroke="#2a3552" stroke-width="0.5"/>`;
      html += `<text x="${LBL_X}" y="${lay.y - 2}"
        fill="#8aa0c5" font-size="8" font-family="Consolas,monospace">${seg.addrTop}</text>`;
    }
    if (seg.id === 'fw') {
      // fw.addrTop: zigzag 아래에 표시
      html += `<line x1="${BAR_X}" y1="${lay.y}" x2="${BAR_X+BAR_W}" y2="${lay.y}" stroke="#2a3552" stroke-width="0.5"/>`;
      html += `<text x="${LBL_X}" y="${lay.y + 9}"
        fill="#8aa0c5" font-size="8" font-family="Consolas,monospace">${seg.addrTop}</text>`;
    }

    // addrBot: 세그먼트 하단 경계선 + 주소 (sbi.addrBot = k/sbi 경계이므로 k 아래 = sbi 위에 표시)
    const botY = lay.y + lay.h;
    html += `<line x1="${BAR_X}" y1="${botY}" x2="${BAR_X+BAR_W}" y2="${botY}" stroke="#2a3552" stroke-width="0.8"/>`;
    // sbi addrBot은 zigzag 바로 위, 다른 건 하단 밖
    const lblOffY = (seg.id === 'sbi') ? botY - 3 : botY + 9;
    html += `<text x="${LBL_X}" y="${lblOffY}"
      fill="#8aa0c5" font-size="8" font-family="Consolas,monospace">${seg.addrBot}</text>`;
  });

  // sp 화살표 (왼쪽 레인: x=10~58, boot_stack_top @ 0x80214000)
  if (showSp) {
    // k 세그먼트: 0x80200000(bot,y=74) ~ 0x80280000(top,y=28), h=46
    const kBot = SEG_LAYOUT.k.y + SEG_LAYOUT.k.h;
    const spY = kBot - ((0x80214000 - 0x80200000) / (0x80280000 - 0x80200000)) * SEG_LAYOUT.k.h;
    const sx1 = 10, sx2 = BAR_X - 62;
    html += `<line x1="${sx1}" y1="${spY}" x2="${sx2}" y2="${spY}"
      stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-sp)"/>`;
    html += `<text x="${sx1}" y="${spY - 4}" fill="#4ade80" font-size="9"
      text-anchor="start" font-family="Consolas,monospace" font-weight="bold">sp</text>`;
    html += `<text x="${sx1}" y="${spY + 11}" fill="#2ab860" font-size="7.5"
      text-anchor="start" font-family="Consolas,monospace">0x80214000</text>`;
  }

  // PC 화살표 (오른쪽 레인: x=68~118)
  if (pcY !== null) {
    const x2 = BAR_X - 2;
    const x1 = BAR_X - 52;
    html += `<line x1="${x1}" y1="${pcY}" x2="${x2}" y2="${pcY}"
      stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-pc)"/>`;
    html += `<text x="${x1}" y="${pcY - 4}" fill="#a78bfa" font-size="9"
      text-anchor="start" font-family="Consolas,monospace" font-weight="bold">PC</text>`;
    html += `<text x="${x1}" y="${pcY + 11}" fill="#7a5aff" font-size="7.5"
      text-anchor="start" font-family="Consolas,monospace">${pcStr}</text>`;
  }

  // 방향 라벨
  html += `<text x="4" y="14" fill="#3a4a60" font-size="8" font-family="Consolas,monospace">↑ HIGH</text>`;
  html += `<text x="4" y="236" fill="#3a4a60" font-size="8" font-family="Consolas,monospace">↓ LOW</text>`;

  svg.innerHTML = html;
}

// ── 레지스터 렌더링 ──
const REG_KEYS = [
  ['PC', 'PC'], ['Mode', 'mode'],
  ['mepc', 'mepc'], ['mstatus', 'mstatus'],
];

function renderRegs(regs) {
  const el = document.getElementById('reg-table');
  let html = '';
  REG_KEYS.forEach(([label, key]) => {
    const val = regs[key] !== undefined ? regs[key] : '─';
    html += `<div class="rv">
      <span class="rk">${label}</span>
      <span class="rvv">${val}</span>
    </div>`;
  });
  el.innerHTML = html;
}

// ── 코드 패널 렌더링 ──
// lineFrom~lineTo 범위 하이라이트, 그 외: done(과거) / 기본(미래 dim)
function renderCode(code, lineFrom, lineTo) {
  const to = (lineTo !== undefined) ? lineTo : lineFrom;
  const el = document.getElementById('code-lines');
  let html = '';
  code.forEach((t, i) => {
    let cls = 'cl';
    if (i < lineFrom)    cls += ' done';
    else if (i <= to)    cls += ' hl';
    // i > to: 기본 dim (cl 만)
    const lineNum = String(i + 1).padStart(2, ' ');
    html += `<span class="${cls}">${lineNum}  ${t}</span>\n`;
  });
  el.innerHTML = html;
  const lines = el.querySelectorAll('.cl');
  if (lines[lineFrom]) lines[lineFrom].scrollIntoView({block:'nearest'});
}

// ── 전체 렌더 ──
function render() {
  const st = STEPS[step];

  // 스텝 바
  document.getElementById('step-num').textContent = `Step ${step + 1} / ${STEPS.length}`;
  document.getElementById('step-title').textContent = st.title;
  document.getElementById('step-file').textContent = st.file;
  document.getElementById('prog-fill').style.width = `${(step / (STEPS.length - 1)) * 100}%`;
  document.getElementById('btn-prev').disabled = step === 0;
  document.getElementById('btn-next').disabled = step === STEPS.length - 1;

  // prevPage 버튼 (첫 스텝)
  const prevPageBtn = document.getElementById('btn-prev-page');
  if (prevPageBtn) {
    if (step === 0 && st.prevPage) {
      prevPageBtn.style.display = 'inline-block';
      prevPageBtn.onclick = () => location.href = st.prevPage;
    } else {
      prevPageBtn.style.display = 'none';
    }
  }

  // nextPage 버튼 (마지막 스텝)
  const nextPageBtn = document.getElementById('btn-next-page');
  if (nextPageBtn) {
    if (step === STEPS.length - 1 && st.nextPage) {
      nextPageBtn.style.display = 'inline-block';
      nextPageBtn.onclick = () => location.href = st.nextPage;
    } else {
      nextPageBtn.style.display = 'none';
    }
  }

  // 코드
  renderCode(st.code, st.lineFrom, st.lineTo);

  // PC 값 (regs에서)
  const pcStr = st.regs.PC || null;

  // SVG 메모리 맵
  renderSVG(st.active || [], pcStr, st.showSp || false);

  // 레지스터
  renderRegs(st.regs);

  // 설명
  document.getElementById('desc-text').textContent = st.desc;
  document.getElementById('desc-detail').textContent = st.detail || '';
}

// ── 내비게이션 ──
function go(d) {
  step = Math.max(0, Math.min(STEPS.length - 1, step + d));
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
});

render();
</script>
</body>
</html>
