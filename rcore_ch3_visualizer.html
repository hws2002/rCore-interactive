<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>rCore ch3 — Task Switch Visualizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Consolas','Courier New',monospace;font-size:13px;height:100vh;display:flex;flex-direction:column}
h1{text-align:center;padding:8px;background:#16213e;color:#a8d8ea;font-size:15px;border-bottom:1px solid #0f3460;letter-spacing:1px}
#main{display:grid;grid-template-columns:30% 20% 50%;flex:1;overflow:hidden;min-width:0}

/* ── COL1: Memory + CPU ── */
#col1{display:flex;flex-direction:column;background:#111827;border-right:1px solid #0f3460;overflow-y:auto;padding:8px;gap:8px;min-width:0}

/* Memory diagram */
#mem-wrap{background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:6px;flex-shrink:0}
#mem-wrap h2{color:#58a6ff;font-size:11px;margin-bottom:4px;letter-spacing:1px}
#mem-svg-container{position:relative;width:100%}
#mem-legend{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.leg{display:flex;align-items:center;gap:3px;font-size:9px}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* CPU state */
#cpu-state{background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:8px;flex-shrink:0}
#cpu-state h2{color:#58a6ff;font-size:11px;margin-bottom:6px}
.cpu-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #1c2333}
.cpu-label{color:#8b949e;font-size:12px}
.cpu-val{color:#f0f6fc;font-weight:bold;font-size:12px}
.cpu-val.u-mode{color:#3fb950}
.cpu-val.s-mode{color:#d29922}
.cpu-val.task0{color:#58a6ff}
.cpu-val.task1{color:#bc8cff}

/* ── COL2: Registers ── */
#col2{display:flex;flex-direction:column;background:#0f1420;border-right:1px solid #0f3460;overflow-y:auto;padding:8px;gap:6px;min-width:0}
#col2-title{color:#58a6ff;font-size:11px;letter-spacing:1px;padding:2px 0 4px;border-bottom:1px solid #0f3460;margin-bottom:2px}
#reg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px}
.reg-cell{display:flex;align-items:center;gap:3px;padding:2px 4px;border-radius:3px;transition:background 0.3s}
.reg-cell.changed{background:#3d2b00;border:1px solid #d29922}

.reg-star{color:#d29922;font-size:9px}
#csr-section{border-top:1px solid #30363d;padding-top:6px;margin-top:4px}

.csr-cell.changed{background:#3d2b00;border-color:#d29922}
.csr-name{color:#79c0ff;font-size:11px;min-width:70px}

/* ── RIGHT PANEL ── */
#right{display:flex;flex-direction:column;background:#0d1117;padding:10px;gap:8px;overflow:hidden;border-left:1px solid #0f3460;min-width:0}

#step-num{color:#58a6ff;font-size:14px;font-weight:bold;min-width:80px}
#step-title{color:#f0f6fc;font-size:14px;font-weight:bold;flex:1}

#code-panel-label{background:#21262d;padding:4px 10px;font-size:11px;color:#8b949e;border-bottom:1px solid #30363d;flex-shrink:0}
#code-lines{flex:1;min-height:0;overflow-y:auto;padding:4px 0;display:flex;flex-direction:column;gap:4px}
.cf{border-radius:4px;overflow:hidden;font-size:12px}

.cf.done .cf-head{background:#1c2333;color:#8b949e}
.cf.active .cf-head{background:#21262d;color:#c9d1d9}

#nav{display:flex;justify-content:center;align-items:center;gap:20px;padding:8px;flex-shrink:0}
.nav-btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 28px;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;transition:all 0.2s}
.nav-btn:hover:not(:disabled){background:#30363d;border-color:#58a6ff;color:#58a6ff}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed}
#progress-bar{flex:1;height:6px;background:#21262d;border-radius:3px;overflow:hidden;max-width:200px}

/* SVG memory styles */

.mem-label{font-size:10px;fill:#c9d1d9;font-family:Consolas,monospace}

<h1>⚡ rCore ch3 — 태스크 전환 인터랙티브 시각화 (타이머 인터럽트 → __alltraps → trap_handler → __switch → __restore)</h1>
<div id="main">

<!-- COL1: 메모리 다이어그램 + CPU 상태 -->
<div id="col1">
  <div id="mem-wrap">
    <h2>📦 물리 메모리 레이아웃</h2>
    <div id="mem-svg-container">
      <svg id="mem-svg" width="100%" viewBox="0 0 260 260" style="display:block"></svg>
    </div>
    <div id="mem-legend">

      <div class="leg"><div class="leg-dot" style="background:#2d6a4f"></div>App0</div>
      <div class="leg"><div class="leg-dot" style="background:#40916c"></div>App1</div>
      <div class="leg"><div class="leg-dot" style="background:#7b3f00"></div>KStack</div>
      <div class="leg"><div class="leg-dot" style="background:#6a1e55"></div>UStack</div>
      <div class="leg"><div class="leg-dot" style="background:#e85d04"></div>TrapCtx</div>
      <div class="leg"><div class="leg-dot" style="background:#f4c542"></div>TaskCtx</div>

    <div class="cpu-row"><span class="cpu-label">PC / sepc</span><span id="c-pc" class="cpu-val">0x80400024</span></div>
    <div class="cpu-row"><span class="cpu-label">sscratch</span><span id="c-scratch" class="cpu-val">0x80282000</span></div>
  </div>
</div>

<!-- COL2: 레지스터 파일 + CSR -->
<div id="col2">
  <div id="col2-title">🔲 레지스터 파일 (x0–x31)</div>
  <div id="reg-grid"></div>
  <div id="csr-section">
    <div id="csr-label">CSR 레지스터</div>

</div>

<!-- COL3: Steps -->
<div id="right">
  <div id="step-bar">
    <div id="step-num">Step 1 / 20</div>
    <div id="step-title">Task0 유저 모드 실행 중</div>

  </div>
  <div id="code-panel">

  </div>

  </div>

<script>
// ── ABI names ──
const ABI = ['zero','ra','sp','gp','tp','t0','t1','t2','s0','s1','a0','a1','a2','a3','a4','a5','a6','a7','s2','s3','s4','s5','s6','s7','s8','s9','s10','s11','t3','t4','t5','t6'];

// ── Memory region definitions (fixed visual heights — readability first) ──
// SVG viewBox: 0 0 260 260, BAR_X=60, BAR_W=120
// Only addrTop shown per region (no duplicate bottom/top labels)
const MEM_LAYOUT = [
  {id:'app1',    y:28,  h:28, label:'App1 .text',  addr:'0x80420000', color:'#40916c'},
  {id:'app0',    y:58,  h:28, label:'App0 .text',  addr:'0x80400000', color:'#2d6a4f'},
  // zigzag gap at y=88
  {id:'ustack1', y:100, h:14, label:'UStack1 4KB', addr:'0x80286000', color:'#6a1e55'},
  {id:'kstack1', y:116, h:34, label:'KStack1 8KB', addr:'0x80285000', color:'#7b3f00'},
  {id:'ustack0', y:152, h:14, label:'UStack0 4KB', addr:'0x80283000', color:'#6a1e55'},
  {id:'kstack0', y:168, h:34, label:'KStack0 8KB', addr:'0x80282000', color:'#7b3f00'},
  {id:'kernel',  y:204, h:46, label:'Kernel',       addr:'0x80280000', color:'#3a5a8c'},
];

// TrapCtx overlays — drawn at top of parent KStack when active
const TRAP_OVERLAYS = {
  trapctx0: {parent:'kstack0', label:'TrapCtx0 272B', color:'#e85d04', h:10},
  trapctx1: {parent:'kstack1', label:'TrapCtx1 272B', color:'#e85d04', h:10},
  taskctx:  {parent:'kernel',  label:'TaskCtx',       color:'#f4c542', h:10},
};

// sp value → visual Y (piecewise linear)
function spToVisualY(sp) {
  const pts = [
    [0x80286000, 100],[0x80285000, 116],[0x80284EF0, 119],
    [0x80283000, 152],[0x80282000, 168],[0x80281EF0, 171],
    [0x80280000, 204],[0x80200000, 250],
  ];
  for (let i = 0; i < pts.length - 1; i++) {
    const [a0,y0] = pts[i], [a1,y1] = pts[i+1];
    if (sp <= a0 && sp >= a1) {
      const t = (a0 - sp) / (a0 - a1);
      return Math.round(y0 + t*(y1-y0));
    }
  }
  return null;
}

// ── Step definitions ──
// Base register state (Task0 user mode)
const BASE_REGS = {
  x0:0, x1:0x80400018, x2:0x80283000, x3:0x80280000, x4:0,
  x5:0, x6:0, x7:0, x8:0x80282ff0, x9:0, x10:0x00000001,
  x11:0, x12:0, x13:0, x14:0, x15:0, x16:0, x17:0,
  x18:0, x19:0, x20:0, x21:0, x22:0, x23:0, x24:0,
  x25:0, x26:0, x27:0, x28:0, x29:0, x30:0, x31:0,
  sepc:0x80400024, sstatus:0x00000000, sscratch:0x80282000
};

// Task1 registers (initial state for first run - mostly 0)
const TASK1_REGS = {
  x0:0, x1:0, x2:0x80286000, x3:0, x4:0,
  x5:0, x6:0, x7:0, x8:0, x9:0, x10:0,
  x11:0, x12:0, x13:0, x14:0, x15:0, x16:0, x17:0,
  x18:0, x19:0, x20:0, x21:0, x22:0, x23:0, x24:0,
  x25:0, x26:0, x27:0, x28:0, x29:0, x30:0, x31:0,
  sepc:0x80420000, sstatus:0x00000000, sscratch:0x80285000
};

// Helper to merge reg changes
function regs(base, changes) {
  return Object.assign({}, base, changes);
}

// User app code (fictional but representative)
const USER_APP = [
  {t:'// user/src/bin/00power.rs'},
  {t:'use user_lib::{println, exit};'},
  {t:''},
  {t:'const BASE: u64 = 10;'},
  {t:'const MOD:  u64 = 100003;'},
  {t:'const LEN:  u64 = 1000;'},
  {t:''},
  {t:'#[no_mangle]'},
  {t:'pub fn main() -> i32 {'},
  {t:'    let (mut s, mut p) = (0u64, 1u64);'},
  {t:'    for i in 0..LEN {'},
  {t:'        p = p * BASE % MOD; // ← CPU 실행 중'},
  {t:'        s = (s + p) % MOD;  // ← 이 순간 타이머 인터럽트 발생!'},
  {t:'    }'},
  {t:'    println!("sum = {}", s);'},
  {t:'    exit(0)'},
  {t:'}'},
];

// Code snippets for each step
const TRAP_S = [
  {t:'__alltraps:'},
  {t:'    csrrw sp, sscratch, sp'},
  {t:'    # sp→KStack, sscratch→UStack'},
  {t:'    addi sp, sp, -34*8'},
  {t:'    sd x1, 1*8(sp)'},
  {t:'    sd x3, 3*8(sp)'},
  {t:'    # save x5~x31 via SAVE_GP'},
  {t:'    .set n, 5 ; .rept 27 ; SAVE_GP %n ; .endr'},
  {t:'    csrr t0, sstatus'},
  {t:'    csrr t1, sepc'},
  {t:'    sd t0, 32*8(sp)'},
  {t:'    sd t1, 33*8(sp)'},
  {t:'    csrr t2, sscratch'},
  {t:'    sd t2, 2*8(sp)'},
  {t:'    mv a0, sp'},
  {t:'    call trap_handler'},
  {t:'__restore:'},
  {t:'    ld t0, 32*8(sp)  # sstatus'},
  {t:'    ld t1, 33*8(sp)  # sepc'},
  {t:'    ld t2, 2*8(sp)   # user sp'},
  {t:'    csrw sstatus, t0'},
  {t:'    csrw sepc, t1'},
  {t:'    csrw sscratch, t2'},
  {t:'    ld x1, 1*8(sp)'},
  {t:'    ld x3, 3*8(sp)'},
  {t:'    # load x5~x31 via LOAD_GP'},
  {t:'    .set n, 5 ; .rept 27 ; LOAD_GP %n ; .endr'},
  {t:'    addi sp, sp, 34*8'},
  {t:'    csrrw sp, sscratch, sp'},
  {t:'    sret'},
];

const SWITCH_S = [
  {t:'__switch:'},
  {t:'    # a0=current_task_cx_ptr'},
  {t:'    # a1=next_task_cx_ptr'},
  {t:'    sd ra, 0(a0)     # save current ra'},
  {t:'    sd sp, 8(a0)     # save current sp'},
  {t:'    # SAVE_SN: sd s0~s11 → (a0)'},
  {t:'    .set n,0 ; .rept 12 ; SAVE_SN %n ; .endr'},
  {t:'    ld ra, 0(a1)     # load next ra'},
  {t:'    # LOAD_SN: ld s0~s11 ← (a1)'},
  {t:'    .set n,0 ; .rept 12 ; LOAD_SN %n ; .endr'},
  {t:'    ld sp, 8(a1)     # load next sp'},
  {t:'    ret              # jump to ra = __restore'},
];

const TRAP_MOD = [
  {t:'pub fn trap_handler(cx: &mut TrapContext)'},
  {t:'        -> &mut TrapContext {'},
  {t:'    let scause = scause::read();'},
  {t:'    let stval  = stval::read();'},
  {t:'    match scause.cause() {'},
  {t:'        Trap::Interrupt('},
  {t:'          Interrupt::SupervisorTimer) => {'},
  {t:'            set_next_trigger();'},
  {t:'            suspend_current_and_run_next();'},
  {t:'        }'},
  {t:'        // ... other traps'},
  {t:'    }'},
  {t:'    cx'},
  {t:'}'},
];

const TASK_MOD = [
  {t:'pub fn suspend_current_and_run_next() {'},
  {t:'    mark_current_suspended();'},
  {t:'    run_next_task();'},
  {t:'}'},
  {t:''},
  {t:'fn mark_current_suspended() {'},
  {t:'    let mut inner = TASK_MANAGER.inner'},
  {t:'                        .exclusive_access();'},
  {t:'    let cur = inner.current_task;'},
  {t:'    inner.tasks[cur].task_status'},
  {t:'        = TaskStatus::Ready;   // ← Task0 → Ready'},
  {t:'}'},
  {t:''},
  {t:'fn run_next_task() {'},
  {t:'    if let Some(next) = find_next_task() {'},
  {t:'        inner.tasks[next].task_status'},
  {t:'            = TaskStatus::Running; // ← Task1 → Running'},
  {t:'        inner.current_task = next;'},
  {t:'        __switch(cur_cx_ptr, next_cx_ptr);'},
  {t:'    }'},
  {t:'}'},
];

// ── callStack helpers ──
const CS_APP_INT     = {file:'user/bin/00power.rs', done:'    // ← 타이머 인터럽트 발생! 실행 중단 (stvec → __alltraps)'};
const CS_TRAP_DONE   = {file:'trap.S',       done:'    call trap_handler'};
const CS_MOD_DONE    = {file:'trap/mod.rs',  done:'    suspend_current_and_run_next()'};
const CS_SW_DONE     = {file:'task/mod.rs',  done:'    __switch(cur_cx_ptr, next_cx_ptr)'};
const CS_RET_DONE    = {file:'task/switch.S',done:'    ret  → __restore'};

// ── Steps ──
const STEPS = [
{
  title:'Task0 유저 모드 실행 중', file:'user/bin/00power.rs', mode:'U', task:0,
  callStack:[{file:'user/bin/00power.rs (main)', code:USER_APP, curLine:12}],
  desc:'Task0이 유저 모드(U-mode)에서 실행 중입니다.\n유저 앱(00power.rs)이 반복 연산을 수행하는 도중입니다.\n\n• sp = 0x80283000 (UStack0)\n• sscratch = 0x80282000 (KStack0 top 보관)\n\n부팅 시 trap::init()이 stvec CSR에 __alltraps 주소를 등록했습니다. 트랩 발생 시 CPU가 자동으로 이 주소로 점프합니다.',
  detail:'stvec 설정: unsafe { stvec::write(__alltraps as usize, TrapMode::Direct); }  (os/src/trap/mod.rs)',
  regs:regs(BASE_REGS, {}), changed:[],
  memActive:['app0','ustack0']
},
{
  title:'타이머 인터럽트 발생! (하드웨어 동작)', file:'RISC-V Hardware', mode:'S', task:0,
  callStack:[CS_APP_INT, {file:'trap.S (__alltraps)', code:TRAP_S, curLine:0}],
  desc:'타이머가 만료되어 하드웨어 인터럽트 발생.\nCPU가 소프트웨어 호출 없이 자동으로:\n① sstatus.SPP ← U (이전 모드 기록)\n② sepc ← 0x80400024 (인터럽트된 PC 저장)\n③ PC ← stvec = __alltraps 주소\n④ 특권 모드 → S-mode 전환\n\nstvec는 Direct 모드 → 모든 트랩이 __alltraps로 집중됩니다.',
  detail:'sstatus.SPIE=1(이전 SIE값), sstatus.SIE=0(인터럽트 마스킹). __alltraps가 다음 명령입니다.',
  regs:regs(BASE_REGS, {sstatus:0x00000100}), changed:['sstatus'],
  memActive:['kernel','app0']
},

// ── State ──
let step = 0;

// ── Render memory SVG ──
function renderMemory(activeSet) {
  const svg = document.getElementById('mem-svg');
  svg.setAttribute('viewBox', '0 0 260 260');
  svg.innerHTML = '';
  const BAR_X = 60, BAR_W = 120;

  function el(tag) { return document.createElementNS('http://www.w3.org/2000/svg', tag); }

  function txt(x, y, content, cls, fill, anchor, fs) {
    const t = el('text');
    t.setAttribute('x', x); t.setAttribute('y', y);
    if (cls)    t.setAttribute('class', cls);
    if (fill)   t.setAttribute('fill', fill);
    if (anchor) t.setAttribute('text-anchor', anchor);
    if (fs)     t.setAttribute('font-size', fs);
    t.textContent = content;
    svg.appendChild(t);
  }

  function rect(x, y, w, h, fill, stroke, sw, pulse) {
    const r = el('rect');
    r.setAttribute('x',x); r.setAttribute('y',y);
    r.setAttribute('width',w); r.setAttribute('height',h);
    r.setAttribute('fill',fill);
    r.setAttribute('stroke', stroke||'#2d3748');
    r.setAttribute('stroke-width', sw||'0.5');
    r.setAttribute('rx','2');
    if (pulse) r.classList.add('mem-pulse');
    svg.appendChild(r);
    return r;
  }

  // Arrow markers
  const defs = el('defs');
  defs.innerHTML = `
    <marker id="arr-sp" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#d29922"/>
    </marker>
    <marker id="arr-sc" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#00bcd4"/>
    </marker>`;
  svg.appendChild(defs);

  // ── "Free" label at top ──
  txt(BAR_X + BAR_W/2, 13, '↑ Free  0x88000000', 'mem-addr', '#4a5568', 'middle', '8');

  // ── Gap zigzag (address gap indicator) ──
  function zigzag(y) {
    const z = el('polyline');
    const pts = [];
    for (let i=0;i<8;i++) pts.push(`${BAR_X + i*15},${y + (i%2===0?0:5)}`);
    z.setAttribute('points', pts.join(' '));
    z.setAttribute('fill','none'); z.setAttribute('stroke','#4a5568');
    z.setAttribute('stroke-width','1'); z.setAttribute('stroke-dasharray','3,2');
    svg.appendChild(z);
  }
  zigzag(16);

  // ── Main regions ──
  MEM_LAYOUT.forEach(r => {
    const isActive = activeSet.includes(r.id);
    rect(BAR_X, r.y, BAR_W, r.h, r.color,
         isActive ? '#ffd700' : '#2d3748',
         isActive ? '2' : '0.5', isActive);

    // Label inside bar
    const fs = r.h > 20 ? '9' : '8';
    txt(BAR_X + BAR_W/2, r.y + r.h/2 + 3, r.label, 'mem-label', null, 'middle', fs);

    // Address label — right side, top of region only
    txt(BAR_X + BAR_W + 3, r.y + 6, r.addr, 'mem-addr', isActive?'#ffd700':'#5a6270', 'start', '7.5');
  });

  // Gap zigzag between apps and stacks
  zigzag(88);
  txt(BAR_X + BAR_W + 3, 91, '···', 'mem-addr', '#4a5568', 'start', '8');

  // Bottom address of Kernel
  txt(BAR_X + BAR_W + 3, 204+46+5, '→0x80200000', 'mem-addr', '#5a6270', 'start', '7.5');

  // ── TrapCtx / TaskCtx overlays ──
  Object.entries(TRAP_OVERLAYS).forEach(([id, ov]) => {
    if (!activeSet.includes(id)) return;
    const parent = MEM_LAYOUT.find(r => r.id === ov.parent);
    if (!parent) return;
    // draw overlay at top of parent
    rect(BAR_X, parent.y, BAR_W, ov.h, ov.color, '#fff', '1.5', true);
    txt(BAR_X + BAR_W/2, parent.y + ov.h/2 + 3, ov.label, 'mem-label', '#fff', 'middle', '9');
  });

  // ── Arrow helper (both on left side → bar) ──
  // x1: start of arrow (left side), points right toward bar at BAR_X
  function drawArrow(y, x1, label, color, markerId) {
    const line = el('line');
    line.setAttribute('x1', x1); line.setAttribute('x2', BAR_X - 2);
    line.setAttribute('y1', y);  line.setAttribute('y2', y);
    line.setAttribute('stroke', color); line.setAttribute('stroke-width','1.5');
    line.setAttribute('marker-end', 'url(#' + markerId + ')');
    svg.appendChild(line);
    txt(x1 - 2, y + 3, label, 'mem-addr', color, 'end', '9');
  }

  // ── sp arrow (left side, yellow, closer to bar) ──
  const st = STEPS[step];
  const spY = spToVisualY(st.regs.x2);
  if (spY !== null) drawArrow(spY, 44, 'sp', '#d29922', 'arr-sp');

  // ── sscratch arrow (left side, cyan, further from bar) ──
  const scY = spToVisualY(st.regs.sscratch);
  if (scY !== null) drawArrow(scY, 26, 'sc', '#00bcd4', 'arr-sc');
}

// ── Render registers ──
function renderRegs(regs, changed) {
  const grid = document.getElementById('reg-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 32; i++) {
    const key = 'x'+i;
    const val = regs[key] || 0;
    const isChanged = changed.includes(key);
    const cell = document.createElement('div');
    cell.className = 'reg-cell' + (isChanged ? ' changed' : '');
    cell.innerHTML = `<span class="reg-name">${key}</span><span class="reg-abi">${ABI[i]}</span><span class="reg-val">0x${val.toString(16).padStart(8,'0')}</span>${isChanged?'<span class="reg-star">★</span>':''}`;
    grid.appendChild(cell);
  }

  // CSR
  const csrGrid = document.getElementById('csr-grid');
  csrGrid.innerHTML = '';
  [['sepc','sepc'],['sstatus','sstatus'],['sscratch','sscratch']].forEach(([k,label]) => {
    const val = regs[k] || 0;
    const isChanged = changed.includes(k);
    const cell = document.createElement('div');
    cell.className = 'csr-cell' + (isChanged ? ' changed' : '');
    cell.innerHTML = `<span class="csr-name">${label}${isChanged?'★':''}</span><span class="csr-val">0x${val.toString(16).padStart(8,'0')}</span>`;
    csrGrid.appendChild(cell);
  });
}

// ── Render call-stack code panel ──
function renderCode(callStack) {
  const panel = document.getElementById('code-lines');
  panel.innerHTML = '';
  if (!callStack || callStack.length === 0) {
    panel.innerHTML = '<div style="padding:10px;color:#8b949e;font-size:12px">— 이 스텝은 하드웨어/개념적 동작입니다 —</div>';
    return;
  }
  callStack.forEach((frame, fi) => {
    const isActive = !!frame.code;  // has code array = active frame
    const wrapper = document.createElement('div');
    wrapper.className = 'cf ' + (isActive ? 'active' : 'done');

    // Header
    const head = document.createElement('div');
    head.className = 'cf-head';
    const badge = document.createElement('span');
    badge.className = 'cf-badge';
    badge.textContent = isActive ? 'ACTIVE' : 'DONE';
    head.appendChild(badge);
    head.appendChild(Object.assign(document.createElement('span'), {textContent: frame.file}));
    wrapper.appendChild(head);

    if (isActive) {
      // Full code body
      const body = document.createElement('div');
      body.className = 'cf-body';
      frame.code.forEach((line, i) => {
        const div = document.createElement('div');
        let cls = 'normal';
        if (i === frame.curLine) cls = 'highlight';
        else if (i < frame.curLine) cls = 'done';
        else if (i > frame.curLine + 4) cls = 'dimmed';
        div.className = 'code-line ' + cls;
        div.innerHTML = `<span class="line-num">${i+1}</span><span class="line-text">${line.t.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>${i===frame.curLine?'<span class="code-arrow">◄</span>':''}`;
        body.appendChild(div);
      });
      wrapper.appendChild(body);
      // Scroll active frame into view after append
      setTimeout(() => {
        const hl = body.querySelector('.highlight');
        if (hl) hl.scrollIntoView({block:'nearest', behavior:'smooth'});
      }, 50);
    } else {
      // Compact done line
      const dl = document.createElement('div');
      dl.className = 'cf-done-line';
      dl.textContent = '✓ ' + (frame.done || '');
      wrapper.appendChild(dl);
    }
    panel.appendChild(wrapper);
  });
}

// ── Render CPU state box ──
function renderCPU(st) {
  const modeEl = document.getElementById('c-mode');
  modeEl.textContent = st.mode === 'U' ? 'U-mode (유저)' : 'S-mode (커널)';
  modeEl.className = 'cpu-val ' + (st.mode === 'U' ? 'u-mode' : 's-mode');

  const taskEl = document.getElementById('c-task');
  taskEl.textContent = 'Task' + st.task;
  taskEl.className = 'cpu-val task' + st.task;

  document.getElementById('c-pc').textContent = '0x' + st.regs.sepc.toString(16).padStart(8,'0');

  const scratchEl = document.getElementById('c-scratch');
  scratchEl.textContent = '0x' + st.regs.sscratch.toString(16).padStart(8,'0');
  // highlight sscratch if it changed this step
  scratchEl.style.color = st.changed.includes('sscratch') ? '#f0c040' : '';
}

// ── Main render ──
function render() {
  const st = STEPS[step];

  // Step bar
  document.getElementById('step-num').textContent = `Step ${step+1} / ${STEPS.length}`;
  document.getElementById('step-title').textContent = st.title;
  document.getElementById('step-file').textContent = st.file;

  // Code
  renderCode(st.callStack);

  // Description
  document.getElementById('desc-text').textContent = st.desc;
  document.getElementById('desc-detail').textContent = st.detail || '';

  // CPU state
  renderCPU(st);

  // Registers
  renderRegs(st.regs, st.changed);

  // Memory
  renderMemory(st.memActive);

  // Progress
  const pct = (step / (STEPS.length - 1)) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  // Buttons
  document.getElementById('btn-prev').disabled = step === 0;
  document.getElementById('btn-next').disabled = step === STEPS.length - 1;
}

function go(dir) {
  step = Math.max(0, Math.min(STEPS.length - 1, step + dir));
  render();
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

// Init
render();
</script>
</body>
</html>
