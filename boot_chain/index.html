<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rCore Boot Chain Visualizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Consolas,"Courier New",monospace;background:#0c1220;color:#e6edf3;height:100vh;display:flex;flex-direction:column}
h1{font-size:14px;color:#9fc3ff;background:#151c2f;border-bottom:1px solid #2a3552;padding:8px 12px}
#main{flex:1;display:grid;grid-template-columns:36% 64%;min-height:0}
#left,#right{padding:10px;overflow:auto}
#left{background:#0b1020;border-right:1px solid #2a3552}
#right{background:#0e1528}
.card{background:#121a2d;border:1px solid #2a3552;border-radius:6px;padding:8px;margin-bottom:10px}
.card h2{font-size:11px;color:#7fb1ff;margin-bottom:6px}
#addr-map{display:flex;flex-direction:column;gap:5px}
.seg{border:1px solid #394968;border-radius:4px;padding:6px}
.seg.active{outline:2px solid #ffd166}
.s-firmware{background:#4a3320}
.s-rustsbi{background:#24496a}
.s-kernel{background:#2f6a4a}
.name{font-size:12px}
.meta{font-size:10px;color:#c7d8f5}
#regs{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.kv{display:flex;justify-content:space-between;border:1px solid #2a3552;border-radius:4px;padding:4px 6px;background:#10192b}
.k{color:#9ab0d5}
.v{color:#f2f7ff}
#stepbar{display:flex;gap:10px;align-items:center}
#stepnum{min-width:90px;color:#7fb1ff;font-weight:bold}
#steptitle{flex:1;font-weight:bold}
#stepfile{font-size:11px;color:#8ea0c1;margin-top:2px}
#code{white-space:pre;line-height:1.45;font-size:12px;border:1px solid #2a3552;border-radius:4px;background:#0f172a;padding:8px;max-height:300px;overflow:auto}
.line{display:block}
.hl{background:#3a2d14;color:#ffd166}
.done{opacity:.45}
#desc{font-size:12px;line-height:1.55;color:#d2def8;white-space:pre-wrap}
#nav{display:flex;gap:10px;align-items:center;margin-top:8px}
button{background:#1b2740;border:1px solid #2a3552;color:#d8e6ff;padding:6px 12px;border-radius:5px;cursor:pointer}
button:disabled{opacity:.4;cursor:not-allowed}
#bar{flex:1;height:6px;background:#1c2842;border-radius:3px;overflow:hidden}
#fill{height:100%;width:0;background:linear-gradient(90deg,#3f7dff,#7fb1ff)}
</style>
</head>
<body>
<h1>Bare-metal Boot: 0x1000 firmware → 0x80000000 RustSBI → 0x80200000 KERNEL_BIN</h1>
<div id="main">
  <div id="left">
    <div class="card">
      <h2>Address Space Map</h2>
      <div id="addr-map"></div>
    </div>
    <div class="card">
      <h2>Machine / Supervisor State</h2>
      <div id="regs"></div>
    </div>
  </div>
  <div id="right">
    <div class="card">
      <h2>Step</h2>
      <div id="stepbar">
        <div id="stepnum"></div>
        <div id="steptitle"></div>
      </div>
      <div id="stepfile"></div>
      <div id="nav">
        <button id="prev" onclick="go(-1)">Prev</button>
        <div id="bar"><div id="fill"></div></div>
        <button id="next" onclick="go(1)">Next</button>
      </div>
    </div>
    <div class="card">
      <h2>Code Path</h2>
      <div id="code"></div>
    </div>
    <div class="card">
      <h2>What Happens</h2>
      <div id="desc"></div>
    </div>
  </div>
</div>
<script src="../boot_chain/data.js"></script>
<script>
let step = 0;

function renderMap(active) {
  const wrap = document.getElementById("addr-map");
  wrap.innerHTML = "";
  SEGMENTS.forEach(s => {
    const d = document.createElement("div");
    d.className = `seg ${s.cls}` + (active.includes(s.id) ? " active" : "");
    d.innerHTML = `<div class="name">${s.name}</div><div class="meta">${s.range}</div><div class="meta">by: ${s.reason}</div>`;
    wrap.appendChild(d);
  });
}

function renderRegs(r) {
  const el = document.getElementById("regs");
  el.innerHTML = "";
  [["PC",r.pc],["Mode",r.mode],["mepc",r.mepc],["stvec",r.stvec],["satp",r.satp]].forEach(([k,v]) => {
    const d = document.createElement("div");
    d.className = "kv";
    d.innerHTML = `<span class="k">${k}</span><span class="v">${v}</span>`;
    el.appendChild(d);
  });
}

function renderCode(code, line) {
  const el = document.getElementById("code");
  el.innerHTML = "";
  code.forEach((t, i) => {
    const d = document.createElement("span");
    d.className = "line" + (i < line ? " done" : "") + (i === line ? " hl" : "");
    d.textContent = `${String(i+1).padStart(2," ")}  ${t}`;
    el.appendChild(d);
  });
}

function render() {
  const st = STEPS[step];
  document.getElementById("stepnum").textContent = `Step ${step+1}/${STEPS.length}`;
  document.getElementById("steptitle").textContent = st.title;
  document.getElementById("stepfile").textContent = st.file;
  document.getElementById("desc").textContent = st.desc;
  renderMap(st.active);
  renderRegs(st.regs);
  renderCode(st.code, st.line);
  document.getElementById("prev").disabled = step === 0;
  document.getElementById("next").disabled = step === STEPS.length - 1;
  document.getElementById("fill").style.width = `${(step/(STEPS.length-1))*100}%`;
}

function go(d) {
  step = Math.max(0, Math.min(STEPS.length - 1, step + d));
  render();
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === "ArrowDown") go(1);
  if (e.key === "ArrowLeft" || e.key === "ArrowUp") go(-1);
});

render();
</script>
</body>
</html>
